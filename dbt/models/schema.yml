version: 2

models:
  - name: int_adzuna_company_metrics
    description: "Métriques agrégées Adzuna par entreprise (company_name_clean)."
    columns:
      - name: company_name_clean
        tests:
          - not_null

  - name: int_offres_all_sources_source
    description: "Source unifiée enrichie + FT + metrics Adzuna (schéma équipe)."
    columns:
      - name: offer_id
        tests:
          - not_null

  - name: int_offres_all_sources_current
    description: "Lignes courantes du snapshot SCD2."
    columns:
      - name: offer_id
        tests:
          - not_null

  - name: mart_offres_clean
    description: "Mart central pour dashboard."
    columns:
      - name: offer_id
        tests:
          - not_null
          - unique

  - name: mart_offres_data_engineer
    columns:
      - name: offer_id
        tests:
          - not_null
